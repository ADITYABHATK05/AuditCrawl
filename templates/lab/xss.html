{% extends "lab/base.html" %}
{% block title %}Reflected XSS Lab{% endblock %}
{% block content %}
<section class="page-head">
  <h1>Reflected XSS Demonstration</h1>
  <p>Input is intentionally reflected in HTML context for educational scanner testing.</p>
</section>

<section class="panel">
  <form method="GET" action="{{ url_for('xss') }}" class="form-row">
    <label for="q">Search Query</label>
    <input id="q" name="q" value="{{ q }}" placeholder="Try hello or a test payload">
    <button type="submit">Search</button>
  </form>
</section>

<section class="panel">
  <h2>Rendered Output</h2>
  <div class="rendered">You searched: {{ q|safe }}</div>
</section>
{% endblock %}
