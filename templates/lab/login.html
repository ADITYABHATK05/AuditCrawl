{% extends "lab/base.html" %}
{% block title %}Login Lab{% endblock %}
{% block content %}
<section class="page-head">
  <h1>Authentication Lab</h1>
  <p>Use test credentials to inspect session behavior.</p>
</section>

<section class="panel slim">
  <form method="POST" action="{{ url_for('login') }}" class="form-row">
    <label for="username">Username</label>
    <input id="username" name="username" placeholder="testuser">
    <label for="password">Password</label>
    <input id="password" name="password" type="password" placeholder="testpass">
    <button type="submit">Sign In</button>
  </form>
  {% if error %}<p class="status error">{{ error }}</p>{% endif %}
  <p class="note">Demo credentials: <strong>testuser</strong> / <strong>testpass</strong></p>
</section>
{% endblock %}
