<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Lab - SSRF</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 24px; }
      .muted { color: #556; }
      .box { padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
      code, pre { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      pre { white-space: pre-wrap; word-break: break-word; }
    </style>
  </head>
  <body>
    <h1>SSRF Surface Lab</h1>
    <p class="muted">Educational only. This page simulates a URL-fetch feature.</p>

    <form method="GET" action="/ssrf" class="box">
      <label>
        url:
        <input name="url" value="{{ target }}" style="width: min(760px, 92vw)" placeholder="http://example.com/" />
      </label>
      <button type="submit">Preview</button>
      <p class="muted">Try: <code>http://169.254.169.254/latest/meta-data/</code></p>
    </form>

    <h2>Preview</h2>
    <pre class="box">{{ preview }}</pre>

    <p><a href="/">Back</a></p>
  </body>
</html>
