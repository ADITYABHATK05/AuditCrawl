{% extends "lab/base.html" %}
{% block title %}SSRF Lab{% endblock %}
{% block content %}
<section class="page-head">
  <h1>SSRF Input Handling Demo</h1>
  <p>URL inputs are accepted for educational SSRF surface detection.</p>
</section>

<section class="panel">
  <form method="GET" action="{{ url_for('ssrf') }}" class="form-row">
    <label for="url">Target URL</label>
    <input id="url" name="url" value="{{ target }}" placeholder="http://example.com">
    <button type="submit">Simulate Fetch</button>
  </form>
</section>

<section class="panel">
  <h2>Simulation Output</h2>
  <pre>{{ preview }}</pre>
</section>
{% endblock %}
